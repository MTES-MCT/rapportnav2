analyse_sonar:
  rules:
    - if: '$ENV_DEPLOIEMENT == "ecole" || $ENV_DEPLOIEMENT == "integration"'
      when: always
  stage: analyze
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [ "" ]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
    GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
  needs:
    - job: build_projet_gradle
      artifacts: true
    - job: test_projet_gradle
      artifacts: true
    - job: test_projet_npm
      artifacts: true
  allow_failure: true
  script:
    # $FAIL_SONAR_CONDITION est défini dans .gitlab-ci.yml (défaut: -Dsonar.qualitygate.wait=true)
    - sonar-scanner -Dproject.settings=sonar-project.properties $FAIL_SONAR_CONDITION
  cache:
    when: always
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  tags:
    - selfservice
