sonar.java.source=25
sonar.java.version=25
sonar.projectKey=RapportNav_v2
sonar.projectName=RapportNav_v2
sonar.java.binaries=.
sonar.sources=./backend/src/main,./frontend/src
sonar.tests=./backend/src/test/kotlin
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*Test.kt

# Coverage reports
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.coverage.jacoco.xmlReportPaths=backend/build/reports/jacoco/test/jacocoTestReport.xml

# https://docs.sonarcloud.io/advanced-setup/analysis-scope/
# Exclude folders from SonarCloud analysis
sonar.exclusions=\
  frontend/node_modules/**,\
  frontend/dist/**,\
  frontend/src/assets/**,\
  frontend/coverage/**,\
  backend/build/**,\
  backend/target/**,\
  backend/gradle/**,\
  backend/.gradle/**

# Exclude config folder from test coverage (pure Spring wiring, no testable logic)
sonar.coverage.exclusions=\
  **/rapportnav/config/**
